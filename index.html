<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Local Lang</title>
  </head>
  <body>
    <div id="main-page">
      <h1>Lessons</h1>
      <p>To add a lesson, enter a title and text, then click the button below.</p>
      <input id="lesson-title" placeholder="Enter lesson title..."></input>
      <input id="lesson-body" placeholder="Paste the article text here..."></input>
      <br>
      <button id="add-lesson-btn">Add lesson</button>
      <div id="lesson-list"></div>
    </div>

    <div id="lesson-page" hidden>
      <button id="back-btn">Back</button>
      <h1 id="lesson-title-field">Lesson title</h1>
      <p id="lesson-body-field">Lesson body</p>
    </div>
  </body>
  <script type="module" src="./src/renderer.js"></script>
</html>
